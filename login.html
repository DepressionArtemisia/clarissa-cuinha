<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Login · Área de Membros · Clarissa Cunha</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500;1,600&family=Jost:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles/tokens.css">
<link rel="icon" href="assets/brand/logo.png" type="image/png">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: var(--ff-sans, 'Jost', sans-serif);
  background: linear-gradient(135deg, #1a1d24 0%, #2A2F3A 50%, #1a1d24 100%);
  min-height: 100vh;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 40px 20px;
  position: relative;
  overflow-x: hidden;
  overflow-y: auto;
}

@media (min-height: 700px) {
  body {
    align-items: center;
  }
}

/* Animated background */
body::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at 20% 50%, rgba(107,166,161,0.1) 0%, transparent 50%),
              radial-gradient(circle at 80% 80%, rgba(186,148,199,0.1) 0%, transparent 50%);
  animation: bgPulse 8s ease-in-out infinite;
}

@keyframes bgPulse {
  0%, 100% { opacity: 0.5; }
  50% { opacity: 1; }
}

/* Floating particles */
.particles {
  position: absolute;
  inset: 0;
  overflow: hidden;
  pointer-events: none;
}

.particle {
  position: absolute;
  width: 4px;
  height: 4px;
  background: rgba(251, 247, 241, 0.3);
  border-radius: 50%;
  animation: float 20s infinite;
}

.particle:nth-child(1) { left: 10%; animation-delay: 0s; }
.particle:nth-child(2) { left: 20%; animation-delay: 2s; }
.particle:nth-child(3) { left: 30%; animation-delay: 4s; }
.particle:nth-child(4) { left: 40%; animation-delay: 1s; }
.particle:nth-child(5) { left: 50%; animation-delay: 3s; }
.particle:nth-child(6) { left: 60%; animation-delay: 5s; }
.particle:nth-child(7) { left: 70%; animation-delay: 2.5s; }
.particle:nth-child(8) { left: 80%; animation-delay: 4.5s; }
.particle:nth-child(9) { left: 90%; animation-delay: 1.5s; }

@keyframes float {
  0% {
    transform: translateY(100vh) scale(0);
    opacity: 0;
  }
  10% {
    opacity: 1;
  }
  90% {
    opacity: 1;
  }
  100% {
    transform: translateY(-100vh) scale(1);
    opacity: 0;
  }
}

/* Login container */
.login-container {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 440px;
  animation: slideUp 0.8s cubic-bezier(0.22, 1, 0.36, 1);
  /* Safe area bottom for iOS notch */
  padding-bottom: env(safe-area-inset-bottom, 0px);
}

@keyframes slideUp {
  from {
    opacity: 0;
    transform: translateY(40px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* Login card */
.login-card {
  background: rgba(251, 247, 241, 0.98);
  -webkit-backdrop-filter: blur(20px);
  backdrop-filter: blur(20px);
  border-radius: 24px;
  padding: 48px 40px;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4),
              0 0 1px rgba(251, 247, 241, 0.1) inset;
  border: 1px solid rgba(251, 247, 241, 0.1);
}

/* Logo */
.login-logo {
  text-align: center;
  margin-bottom: 32px;
  display: flex;
  justify-content: center;
  align-items: center;
}

.login-logo img {
  height: 56px;
  width: auto;
  display: block;
  margin: 0 auto;
  filter: drop-shadow(0 2px 8px rgba(42, 47, 58, 0.1));
}

/* Header */
.login-header {
  text-align: center;
  margin-bottom: 32px;
}

.login-header h1 {
  font-family: var(--ff-display, 'Cormorant Garamond', serif);
  font-weight: 300;
  font-size: clamp(28px, 5vw, 36px);
  color: #2A2F3A;
  margin-bottom: 8px;
  letter-spacing: -0.02em;
}

.login-header p {
  font-size: 14px;
  color: rgba(42, 47, 58, 0.6);
  line-height: 1.5;
}

/* Social buttons */
.social-login {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-bottom: 28px;
}

.social-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 14px 20px;
  border-radius: 12px;
  border: 1.5px solid rgba(42, 47, 58, 0.15);
  background: white;
  font-family: var(--ff-sans);
  font-size: 14px;
  font-weight: 500;
  color: #2A2F3A;
  cursor: pointer;
  transition: all 300ms cubic-bezier(0.34, 1.56, 0.64, 1);
  position: relative;
  overflow: hidden;
}

.social-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, transparent, rgba(107,166,161,0.1));
  opacity: 0;
  transition: opacity 300ms;
}

.social-btn:hover::before {
  opacity: 1;
}

.social-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(42, 47, 58, 0.15);
  border-color: rgba(107,166,161,0.3);
}

.social-btn:active {
  transform: translateY(0);
}

.social-btn svg {
  width: 20px;
  height: 20px;
  flex-shrink: 0;
}

/* Divider */
.divider {
  display: flex;
  align-items: center;
  gap: 16px;
  margin: 28px 0;
  color: rgba(42, 47, 58, 0.4);
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
}

.divider::before,
.divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: rgba(42, 47, 58, 0.1);
}

/* Form */
.login-form {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.form-group {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.form-group label {
  font-size: 12px;
  font-weight: 500;
  color: #2A2F3A;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}

.form-group input {
  padding: 14px 16px;
  border-radius: 12px;
  border: 1.5px solid rgba(42, 47, 58, 0.15);
  background: white;
  font-family: var(--ff-sans);
  font-size: 15px;
  color: #2A2F3A;
  transition: all 300ms;
}

.form-group input:focus {
  outline: none;
  border-color: #6BA6A1;
  box-shadow: 0 0 0 3px rgba(107,166,161,0.1);
}

.form-group input::placeholder {
  color: rgba(42, 47, 58, 0.3);
}

/* Remember & Forgot */
.form-options {
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 13px;
}

.remember-me {
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  color: rgba(42, 47, 58, 0.7);
}

.remember-me input[type="checkbox"] {
  width: 18px;
  height: 18px;
  cursor: pointer;
  accent-color: #6BA6A1;
}

.forgot-link {
  color: #6BA6A1;
  text-decoration: none;
  font-weight: 500;
  transition: color 300ms;
}

.forgot-link:hover {
  color: #5a8f8b;
}

/* Submit button */
.submit-btn {
  padding: 16px 24px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(135deg, #6BA6A1 0%, #5a8f8b 100%);
  color: white;
  font-family: var(--ff-sans);
  font-size: 15px;
  font-weight: 600;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 400ms cubic-bezier(0.34, 1.56, 0.64, 1);
  box-shadow: 0 4px 16px rgba(107,166,161,0.3);
  margin-top: 8px;
}

.submit-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(107,166,161,0.4);
}

.submit-btn:active {
  transform: translateY(0);
}

/* Footer */
.login-footer {
  text-align: center;
  margin-top: 32px;
  padding-top: 28px;
  border-top: 1px solid rgba(42, 47, 58, 0.1);
}

.login-footer p {
  font-size: 14px;
  color: rgba(42, 47, 58, 0.6);
  margin-bottom: 12px;
}

.signup-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: #6BA6A1;
  text-decoration: none;
  font-weight: 600;
  font-size: 15px;
  transition: all 300ms;
}

.signup-link:hover {
  color: #5a8f8b;
  gap: 10px;
}

.signup-link svg {
  width: 16px;
  height: 16px;
  transition: transform 300ms;
}

.signup-link:hover svg {
  transform: translateX(4px);
}

/* Loading state */
.loading {
  pointer-events: none;
  opacity: 0.6;
}

.loading .submit-btn {
  position: relative;
}

.loading .submit-btn::after {
  content: '';
  position: absolute;
  width: 16px;
  height: 16px;
  border: 2px solid white;
  border-top-color: transparent;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
  right: 20px;
  top: 50%;
  transform: translateY(-50%);
}

@keyframes spin {
  to { transform: translateY(-50%) rotate(360deg); }
}

/* Mobile optimizations */
@media (max-width: 600px) {
  body {
    padding: 24px 16px 40px;
    align-items: flex-start;
    /* Garante scroll total no mobile */
    overflow-y: auto !important;
    overflow-x: hidden !important;
  }

  .login-container {
    width: 100%;
    padding-bottom: 24px;
  }

  .login-card {
    padding: 32px 24px 36px;
    border-radius: 20px;
  }

  .login-logo {
    margin-bottom: 24px;
  }

  .login-logo img {
    height: 52px;
    margin: 0 auto;
    display: block;
  }

  .login-header {
    margin-bottom: 24px;
  }

  .login-header h1 {
    font-size: 26px;
  }

  .social-login {
    gap: 10px;
    margin-bottom: 20px;
  }

  .social-btn {
    padding: 14px 16px;
    font-size: 14px;
    min-height: 52px;
  }

  .divider {
    margin: 20px 0;
  }

  .login-form {
    gap: 16px;
  }

  .form-group input {
    padding: 14px 14px;
    font-size: 16px; /* Prevent zoom on iOS */
    min-height: 52px;
  }

  .submit-btn {
    padding: 16px 20px;
    font-size: 15px;
    min-height: 52px;
    margin-top: 4px;
  }

  .login-footer {
    margin-top: 24px;
    padding-top: 20px;
  }

  /* Particles desativadas no mobile para performance */
  .particles {
    display: none;
  }
}

/* Success animation */
@keyframes successPulse {
  0% {
    transform: scale(1);
    opacity: 1;
  }
  50% {
    transform: scale(1.05);
    opacity: 0.8;
  }
  100% {
    transform: scale(1);
    opacity: 1;
  }
}

.success {
  animation: successPulse 0.6s ease-out;
}
</style>
</head>
<body>

<!-- Particles -->
<div class="particles">
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>
</div>

<!-- Login Container -->
<div class="login-container">
  <div class="login-card">
    <!-- Logo -->
    <div class="login-logo">
      <img src="assets/brand/logo.svg" alt="Clarissa Cunha" />
    </div>
    
    <!-- Header -->
    <div class="login-header">
      <h1>Bem-vinda de volta</h1>
      <p>Acesse sua área exclusiva de membros</p>
    </div>
    
    <!-- Social Login -->
    <div class="social-login">
      <button type="button" class="social-btn" onclick="socialLogin('google')">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Continuar com Google
      </button>
      
      <button type="button" class="social-btn" onclick="socialLogin('facebook')">
        <svg viewBox="0 0 24 24" fill="#1877F2">
          <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
        </svg>
        Continuar com Facebook
      </button>
    </div>
    
    <!-- Divider -->
    <div class="divider">ou com email</div>
    
    <!-- Login Form -->
    <form class="login-form" id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="email">Email</label>
        <input 
          type="email" 
          id="email" 
          name="email" 
          placeholder="seu@email.com" 
          required 
        />
      </div>
      
      <div class="form-group">
        <label for="password">Senha</label>
        <input 
          type="password" 
          id="password" 
          name="password" 
          placeholder="Digite sua senha" 
          required 
        />
      </div>
      
      <div class="form-options">
        <label class="remember-me">
          <input type="checkbox" name="remember" />
          <span>Lembrar de mim</span>
        </label>
        <a href="#" class="forgot-link">Esqueceu a senha?</a>
      </div>
      
      <button type="submit" class="submit-btn">Entrar</button>
    </form>
    
    <!-- Footer -->
    <div class="login-footer">
      <p>Não é membro ainda?</p>
      <a href="assessoria-online.html" class="signup-link">
        Conheça a Assessoria Online
        <svg viewBox="0 0 16 10" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M1 5h14m0 0L11 1m4 4l-4 4"/>
        </svg>
      </a>
    </div>
  </div>
</div>

<script>
// Social login
function socialLogin(provider) {
  console.log(`Login com ${provider}`);
  // Simular login social
  setTimeout(() => {
    window.location.href = 'membros.html';
  }, 1000);
}

// Handle login
function handleLogin(e) {
  e.preventDefault();
  
  const form = e.target;
  const email = form.email.value;
  const password = form.password.value;
  
  // Add loading state
  form.classList.add('loading');
  
  // Simulate API call
  setTimeout(() => {
    // Check password (demo: 0000)
    if (password === '0000') {
      // Success
      form.classList.remove('loading');
      form.classList.add('success');
      
      // Redirect after animation
      setTimeout(() => {
        window.location.href = 'membros.html';
      }, 600);
    } else {
      // Error
      form.classList.remove('loading');
      alert('Senha incorreta! Use: 0000');
    }
  }, 1500);
}

// Add enter animation on load
window.addEventListener('load', () => {
  document.querySelector('.login-container').style.opacity = '1';
});
</script>

</body>
</html>
